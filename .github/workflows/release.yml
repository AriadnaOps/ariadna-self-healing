name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: release_notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Set up QEMU and Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/ariadna-ops/selfhealing-operator:${{ steps.version.outputs.version }}
            ghcr.io/ariadna-ops/selfhealing-operator:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Package Helm chart
        run: |
          helm package charts/selfhealing-operator \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }} \
            --destination .
          CHART_TGZ=$(ls selfhealing-operator-*.tgz)
          echo "chart_tgz=$CHART_TGZ" >> $GITHUB_OUTPUT

      - name: Push Helm chart to OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push selfhealing-operator-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/ariadna-ops

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.git-cliff.outputs.changelog }}
          files: selfhealing-operator-${{ steps.version.outputs.version }}.tgz
          generate_release_notes: true
          make_latest: true
