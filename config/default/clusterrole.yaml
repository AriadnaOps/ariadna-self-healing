apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: selfhealing-operator
  labels:
    app.kubernetes.io/name: selfhealing-operator
    app.kubernetes.io/part-of: ariadna-self-healing
rules:
  # --- Read permissions (Monitoring) ---
  - apiGroups: [""]
    resources: [pods, pods/status]
    verbs: [get, list, watch, patch]
  - apiGroups: [""]
    resources: [events]
    verbs: [get, list, watch, create, patch]
  - apiGroups: [""]
    resources: [nodes, nodes/status]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services, endpoints, configmaps, persistentvolumeclaims]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets]
    verbs: [get, list, watch]

  # --- Write permissions (Remediation) ---
  - apiGroups: [""]
    resources: [pods]
    verbs: [delete]
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [patch, update]
  - apiGroups: [apps]
    resources: [deployments/scale, statefulsets/scale]
    verbs: [get, patch, update]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [patch, update]

  # --- CRD permissions ---
  - apiGroups: [selfhealing.ariadna-ops.com]
    resources: [scenariolibraries, scenariolibraries/status]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [selfhealing.ariadna-ops.com]
    resources: [clusterremediationpolicies, clusterremediationpolicies/status]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [selfhealing.ariadna-ops.com]
    resources: [remediationtasks, remediationtasks/status]
    verbs: [get, list, watch, create, update, patch, delete]

  # --- Leader election ---
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
