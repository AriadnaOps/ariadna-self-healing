apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfhealing-operator
  labels:
    app.kubernetes.io/name: selfhealing-operator
    app.kubernetes.io/part-of: ariadna-self-healing
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: selfhealing-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: selfhealing-operator
        app.kubernetes.io/part-of: ariadna-self-healing
    spec:
      serviceAccountName: selfhealing-operator
      containers:
        - name: operator
          image: ghcr.io/ariadna-ops/selfhealing-operator:dev
          imagePullPolicy: Never
          args:
            - --log-level=debug
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
