# Default Kustomize base for the self-healing operator.
# Apply with: kubectl apply -k config/default
# Install CRDs first: kubectl apply -k config/crd
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: selfhealing-system
# includeSelectors: false so Deployment/Service selectors are not modified.
# spec.selector is immutable; keeping only app.kubernetes.io/name in selectors
# (as in deployment.yaml and service.yaml) avoids "field is immutable" on upgrade.
labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: selfhealing-operator
      app.kubernetes.io/part-of: ariadna-self-healing
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - deployment.yaml
  - service.yaml
  - service-otlp.yaml
