apiVersion: v1
kind: Service
metadata:
  name: selfhealing-operator
  labels:
    app.kubernetes.io/name: selfhealing-operator
    app.kubernetes.io/part-of: ariadna-self-healing
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: selfhealing-operator
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
